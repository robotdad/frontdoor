  fill="white"/>

<!-- Header dot 1: Apple green (services running) -->
<circle cx="9.2654" cy="9.2654" r="2.917" fill="#34C759"/>
<!-- Header dot 2: White (neutral) -->
<circle cx="18.5308" cy="9.2654" r="2.917" fill="white"/>
<!-- Header dot 3: Apple blue (auth / primary accent) -->
<circle cx="27.7962" cy="9.2654" r="2.917" fill="#007AFF"/>

